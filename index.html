<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoCopy</title>
    <link rel="icon" type="image/jpeg" href="/src/assets/images/geocopy_logo_1781560704194.jpg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA & Mobile Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GeoCopy" />
    <link rel="apple-touch-icon" href="/icon-192.jpg" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script>
      // Polyfill process.env safely for browser-side libraries
      window.process = window.process || { env: {} };

      // Register PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker registered successfully with scope:', reg.scope))
            .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
